<?xml version="1.0" encoding="UTF-8"?>
<!--
  Coco — vertical lockup (mark + wordmark), light variant

  • White background
  • Mark: anchor C in deep midnight + accent C with deeper Apple Intelligence gradient
  • Wordmark: "coco" with deeper gradient (saturated for white-bg legibility)
  • Single weight, generous space, no decoration
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 720" width="512" height="720" role="img" aria-label="Coco">
  <defs>
    <!-- Deeper gradient for light backgrounds -->
    <linearGradient id="intelligenceLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B5CFF"/>
      <stop offset="50%" stop-color="#3D7DFF"/>
      <stop offset="100%" stop-color="#36C9A6"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect x="0" y="0" width="512" height="720" fill="#FFFFFF"/>

  <!-- Icon mark, centered, top -->
  <g transform="translate(0, 30)">
    <!-- C #1: anchor, deep midnight -->
    <path d="M 232 158
             A 100 100 0 1 0 232 358"
          stroke="#0A0F1F"
          stroke-width="24"
          stroke-linecap="round"
          fill="none"/>
    <!-- C #2: accent, gradient -->
    <path d="M 280 158
             A 100 100 0 1 1 280 358"
          stroke="url(#intelligenceLight)"
          stroke-width="24"
          stroke-linecap="round"
          fill="none"/>
  </g>

  <!-- Wordmark "coco" — gradient fill -->
  <text x="256" y="635"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="160" font-weight="700"
        fill="url(#intelligenceLight)"
        text-anchor="middle"
        letter-spacing="-6">
    coco
  </text>
</svg>
