<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }}</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;
  --blue:#58a6ff;--purple:#bc8cff;
}
html{font-size:14px;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
body{min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;flex-wrap:wrap;align-items:center;gap:16px}
.header h1{font-size:1.25rem;font-weight:600;flex:1;min-width:200px}
.header .meta{display:flex;gap:16px;flex-wrap:wrap}
.header .meta .tag{background:var(--bg3);padding:4px 10px;border-radius:6px;font-size:0.8rem;display:flex;align-items:center;gap:4px}
.header .meta .tag .label{color:var(--text2)}
.header .meta .tag .value{color:var(--text);font-weight:500}

/* Player controls */
.player{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem;font-family:inherit;transition:background 0.15s}
.btn:hover{background:var(--border)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:#4c8fdb}
.progress-wrap{flex:1;height:6px;background:var(--bg3);border-radius:3px;cursor:pointer;position:relative}
.progress-bar{height:100%;background:var(--accent);border-radius:3px;transition:width 0.1s linear;width:0%}
.time-display{font-size:0.8rem;color:var(--text2);min-width:70px;text-align:right;font-variant-numeric:tabular-nums}
.speed-controls{display:flex;gap:4px}
.speed-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:3px 8px;border-radius:4px;cursor:pointer;font-size:0.75rem;font-family:inherit}
.speed-btn:hover,.speed-btn.active{color:var(--accent);border-color:var(--accent)}

/* Main content */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.events{flex:1;overflow-y:auto;padding:8px 0}
.event{padding:8px 24px;display:flex;gap:12px;border-bottom:1px solid transparent;transition:background 0.15s}
.event:hover{background:var(--bg2)}
.event.active{background:var(--bg2);border-left:3px solid var(--accent)}
.event .idx{color:var(--text3);font-size:0.75rem;min-width:32px;text-align:right;padding-top:2px;font-variant-numeric:tabular-nums}
.event .icon{width:20px;text-align:center;font-size:0.9rem;padding-top:1px;flex-shrink:0}
.event .body{flex:1;min-width:0}
.event .body .type-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;font-weight:600}
.event .body .content{font-size:0.85rem;line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow:hidden;transition:max-height 0.3s}
.event .body .content.expanded{max-height:none}
.event .body .toggle{color:var(--accent);cursor:pointer;font-size:0.75rem;margin-top:4px;display:inline-block}
.event .body .file-path{color:var(--text2);font-size:0.75rem;font-family:'SF Mono',Consolas,monospace;margin-top:2px}

/* Event type colors */
.event-thinking .type-label{color:var(--purple)}
.event-thinking .icon{color:var(--purple)}
.event-tool_use .type-label{color:var(--yellow)}
.event-tool_use .icon{color:var(--yellow)}
.event-tool_result .type-label{color:var(--text2)}
.event-tool_result .icon{color:var(--text2)}
.event-text .type-label{color:var(--green)}
.event-text .icon{color:var(--green)}
.event-error .type-label{color:var(--red)}
.event-error .icon{color:var(--red)}
.event-unknown .type-label{color:var(--text3)}
.event-unknown .icon{color:var(--text3)}

/* Diff */
.diff{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-top:6px;font-family:'SF Mono',Consolas,'Liberation Mono',monospace;font-size:0.78rem;line-height:1.6;overflow-x:auto;max-height:300px;overflow-y:auto}
.diff .line-add{color:var(--green);background:rgba(63,185,80,0.1)}
.diff .line-del{color:var(--red);background:rgba(248,81,73,0.1)}
.diff .line-hunk{color:var(--blue);font-weight:600}
.diff .line-header{font-weight:700;color:var(--text)}

/* Syntax highlighting */
.diff .kw{color:var(--blue)}
.diff .str{color:var(--green)}
.diff .cm{color:var(--text3)}
.diff .fn{color:var(--yellow)}

/* Footer */
.footer{background:var(--bg2);border-top:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.footer .stats{display:flex;gap:16px;font-size:0.8rem;color:var(--text2)}
.footer .branding{font-size:0.75rem;color:var(--text3)}
.footer .branding a{color:var(--accent);text-decoration:none}

/* Responsive */
@media(max-width:640px){
  .header{padding:12px 16px}
  .player{padding:10px 16px}
  .event{padding:8px 16px}
  .footer{padding:10px 16px}
  .header .meta{gap:8px}
  .speed-controls{display:none}
}
</style>
</head>
<body>

<div class="header">
  <h1>{{ agent_name }}</h1>
  <div class="meta">
    <div class="tag"><span class="label">Model</span><span class="value">{{ model }}</span></div>
    <div class="tag"><span class="label">Date</span><span class="value">{{ date[:10] if date else '—' }}</span></div>
    <div class="tag"><span class="label">Duration</span><span class="value">{{ duration_display }}</span></div>
    <div class="tag"><span class="label">Cost</span><span class="value">{{ cost_display }}</span></div>
    <div class="tag"><span class="label">Files</span><span class="value">{{ files_changed }}</span></div>
  </div>
</div>

<div class="player">
  <button class="btn primary" id="playBtn" title="Play/Pause (Space)">&#9654; Play</button>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <span class="time-display" id="timeDisplay">0 / {{ event_count }}</span>
  <div class="speed-controls">
    <button class="speed-btn" data-speed="0.5">0.5x</button>
    <button class="speed-btn active" data-speed="1">1x</button>
    <button class="speed-btn" data-speed="2">2x</button>
    <button class="speed-btn" data-speed="4">4x</button>
  </div>
</div>

<div class="main">
  <div class="events" id="eventList"></div>
</div>

<div class="footer">
  <div class="stats">
    <span>{{ event_count }} events</span>
    <span>{{ cost_display }}</span>
    <span>{{ files_changed }} files changed</span>
  </div>
  <div class="branding">Built with <a href="https://github.com/rijulkalra2000/Project-Coco" target="_blank">CoCo</a></div>
</div>

<script id="replayData" type="application/json">{{ events_json }}</script>

<script>
(function(){
  "use strict";

  var events = JSON.parse(document.getElementById("replayData").textContent);
  var eventList = document.getElementById("eventList");
  var playBtn = document.getElementById("playBtn");
  var progressBar = document.getElementById("progressBar");
  var progressWrap = document.getElementById("progressWrap");
  var timeDisplay = document.getElementById("timeDisplay");

  var playing = false;
  var currentIdx = -1;
  var speed = 1;
  var timer = null;
  var totalEvents = events.length;

  // Icon map
  var icons = {
    thinking: "\uD83E\uDDE0",
    tool_use: "\uD83D\uDD27",
    tool_result: "\uD83D\uDCCB",
    text: "\uD83D\uDCAC",
    error: "\u26A0\uFE0F",
    unknown: "\u2753"
  };

  // Render all events
  function renderEvents() {
    var html = "";
    for (var i = 0; i < totalEvents; i++) {
      var e = events[i];
      var typeClass = "event-" + (e.type || "unknown");
      var icon = icons[e.type] || icons.unknown;
      var label = (e.type || "unknown").replace("_", " ");
      var content = escapeHtml(e.content || "");
      var needsToggle = content.length > 300;

      html += '<div class="event ' + typeClass + '" data-idx="' + i + '">';
      html += '<span class="idx">' + (i + 1) + '</span>';
      html += '<span class="icon">' + icon + '</span>';
      html += '<div class="body">';
      html += '<div class="type-label">' + label + '</div>';
      html += '<div class="content">' + formatContent(e) + '</div>';
      if (needsToggle) {
        html += '<span class="toggle" onclick="toggleExpand(this)">Show more</span>';
      }
      if (e.file_path) {
        html += '<div class="file-path">' + escapeHtml(e.file_path) + '</div>';
      }
      if (e.diff) {
        html += '<div class="diff">' + formatDiff(e.diff) + '</div>';
      }
      html += '</div></div>';
    }
    eventList.innerHTML = html;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function formatContent(e) {
    var c = escapeHtml(e.content || "");
    if (e.type === "thinking") {
      return '<em>(thinking...)</em>\n' + c;
    }
    return c;
  }

  function formatDiff(diff) {
    var lines = diff.split("\n");
    var out = "";
    for (var i = 0; i < lines.length; i++) {
      var line = escapeHtml(lines[i]);
      var cls = "";
      if (lines[i].charAt(0) === "+") cls = "line-add";
      else if (lines[i].charAt(0) === "-") cls = "line-del";
      else if (lines[i].substr(0, 2) === "@@") cls = "line-hunk";
      else if (lines[i].substr(0, 3) === "---" || lines[i].substr(0, 3) === "+++") cls = "line-header";

      // Simple syntax highlighting for added lines
      if (cls === "line-add" || cls === "") {
        line = highlightSyntax(line);
      }

      out += '<div class="' + cls + '">' + line + '</div>';
    }
    return out;
  }

  function highlightSyntax(line) {
    // Comments
    line = line.replace(/(\/\/.*$|#.*$)/gm, '<span class="cm">$1</span>');
    // Strings
    line = line.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g, '<span class="str">$1</span>');
    // Keywords (Python + JS/TS + shell)
    line = line.replace(/\b(def|class|import|from|return|if|elif|else|for|while|try|except|finally|with|as|yield|async|await|raise|pass|break|continue|None|True|False|self|function|const|let|var|export|default|interface|type|enum|then|fi|do|done|echo|exit)\b/g, '<span class="kw">$1</span>');
    // Function calls
    line = line.replace(/\b([a-zA-Z_]\w*)\s*\(/g, '<span class="fn">$1</span>(');
    return line;
  }

  // Playback
  function advanceTo(idx) {
    if (idx < 0) idx = 0;
    if (idx >= totalEvents) idx = totalEvents - 1;

    // Remove active from previous
    var prev = eventList.querySelector(".event.active");
    if (prev) prev.classList.remove("active");

    currentIdx = idx;

    var el = eventList.querySelector('.event[data-idx="' + idx + '"]');
    if (el) {
      el.classList.add("active");
      el.scrollIntoView({ block: "center", behavior: "smooth" });
    }

    var pct = totalEvents > 0 ? ((idx + 1) / totalEvents * 100) : 0;
    progressBar.style.width = pct + "%";
    timeDisplay.textContent = (idx + 1) + " / " + totalEvents;
  }

  function tick() {
    if (!playing) return;
    if (currentIdx >= totalEvents - 1) {
      pause();
      return;
    }
    advanceTo(currentIdx + 1);
    var delay = getDelay(events[currentIdx]);
    timer = setTimeout(tick, delay / speed);
  }

  function getDelay(e) {
    if (!e) return 400;
    switch (e.type) {
      case "thinking": return 300;
      case "tool_use": return 600;
      case "tool_result": return 400;
      case "text": return 500;
      case "error": return 800;
      default: return 400;
    }
  }

  function play() {
    playing = true;
    playBtn.innerHTML = "&#10074;&#10074; Pause";
    playBtn.classList.add("active");
    if (currentIdx >= totalEvents - 1) currentIdx = -1;
    tick();
  }

  function pause() {
    playing = false;
    clearTimeout(timer);
    playBtn.innerHTML = "&#9654; Play";
    playBtn.classList.remove("active");
  }

  function togglePlay() {
    if (playing) pause();
    else play();
  }

  // Event listeners
  playBtn.addEventListener("click", togglePlay);

  progressWrap.addEventListener("click", function(e) {
    var rect = progressWrap.getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    var idx = Math.floor(pct * totalEvents);
    advanceTo(idx);
    if (playing) {
      clearTimeout(timer);
      timer = setTimeout(tick, getDelay(events[idx]) / speed);
    }
  });

  document.querySelectorAll(".speed-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".speed-btn").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      speed = parseFloat(btn.dataset.speed);
    });
  });

  // Keyboard shortcuts
  document.addEventListener("keydown", function(e) {
    if (e.key === " " || e.key === "k") { e.preventDefault(); togglePlay(); }
    else if (e.key === "ArrowRight" || e.key === "l") { e.preventDefault(); advanceTo(currentIdx + 1); }
    else if (e.key === "ArrowLeft" || e.key === "j") { e.preventDefault(); advanceTo(currentIdx - 1); }
    else if (e.key === "Home") { e.preventDefault(); advanceTo(0); }
    else if (e.key === "End") { e.preventDefault(); advanceTo(totalEvents - 1); }
  });

  // Click on event to seek
  eventList.addEventListener("click", function(e) {
    var el = e.target.closest(".event");
    if (!el) return;
    var idx = parseInt(el.dataset.idx, 10);
    if (!isNaN(idx)) advanceTo(idx);
  });

  // Toggle expand
  window.toggleExpand = function(el) {
    var content = el.previousElementSibling;
    if (!content) return;
    content.classList.toggle("expanded");
    el.textContent = content.classList.contains("expanded") ? "Show less" : "Show more";
  };

  // Init
  renderEvents();
  timeDisplay.textContent = "0 / " + totalEvents;
})();
</script>
</body>
</html>
