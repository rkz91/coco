name: Feature Request
description: Suggest a new feature for CoCo Platform
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: edition
    attributes:
      label: Target edition
      options:
        - Core (free)
        - Studio (premium)
        - Not sure
    validations:
      required: true
